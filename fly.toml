# fly.toml app configuration file generated for tradingagents-india-paper on 2026-05-15T08:00:43Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "tradingagents-india-paper"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  BOT_ENABLED = "false"
  DASHBOARD_LIVE_PRICES = "0"
  PAPER_DATA_DIR = "/data"
  PAPER_LOCK_FILE = "paper_trader.lock"
  PAPER_LOG_FILE = "paper_trades.log"
  PAPER_STATE_FILE = "paper_portfolio.json"
  TRADING_MODE = "paper"

[[mounts]]
  source = "tradingagents_data"
  destination = "/data"
  processes = ["app"]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
